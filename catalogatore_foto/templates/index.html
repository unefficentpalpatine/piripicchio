<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Photo Renamer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-container main-wrapper">
        <header>
            <h1>AI Photo Renamer</h1>
            <p>Intelligenza Artificiale per l'organizzazione delle tue immagini</p>
        </header>

        <section class="control-panel">
            <div class="form-group">
                <label for="folder-path">Cartella Selezionata</label>
                <div class="input-row">
                    <input type="text" id="folder-path" readonly placeholder="Nessuna cartella selezionata...">
                    <button id="btn-choose" class="btn-secondary">Scegli Cartella</button>
                </div>
            </div>

            <div class="form-group highlight-box">
                <label for="prompt">Personalizzazione Prompt</label>
                <input type="text" id="prompt" placeholder="Es: dammi 3 tag" value="">
            </div>

            <div class="action-row">
                <button id="btn-start" class="btn-primary">AVVIA RINOMINA</button>
            </div>
            
            <div class="progress-wrapper">
                <div class="status-label" id="status-label">Pronto.</div>
                <div class="progress-bar-container">
                    <div class="progress-bar-fill" id="progress-fill"></div>
                </div>
            </div>
        </section>

        <section class="console-panel">
            <div class="console-header" style="display: flex; justify-content: space-between; align-items: center;">
                <span>Log Operazioni</span>
                <button id="btn-shutdown" class="btn-danger">SPEGNI APP</button>
            </div>
            <div class="console-body" id="log-console">
                <!-- I log appariranno qui -->
            </div>
        </section>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
